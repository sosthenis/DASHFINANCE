function MetricBox({ label, value, sub, color }) {

}

function FIITable({ data, sort, setSort }) {
  const sorted = [...data].sort((a, b) => {
    if (!sort) return 0;
    const dir = sort.dir === "asc" ? 1 : -1;
    return (a[sort.key] - b[sort.key]) * dir;
  });
  const toggleSort = (key) => {
    if (sort?.key === key) setSort({ key, dir: sort.dir === "asc" ? "desc" : "asc" });
    else setSort({ key, dir: "desc" });
  };
  const hdr = (label, key) => (
    <th onClick={() => toggleSort(key)} style={{
      cursor: "pointer", padding: "10px 8px", textAlign: "right", color: GOLD,
      fontSize: 11, textTransform: "uppercase", letterSpacing: 1, borderBottom: `2px solid ${GOLD}44`,
      userSelect: "none", whiteSpace: "nowrap",
    }}>
      {label} {sort?.key === key ? (sort.dir === "asc" ? "▲" : "▼") : ""}
    </th>
  );

  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr>
            <th style={{ padding: "10px 8px", textAlign: "left", color: GOLD, fontSize: 11, textTransform: "uppercase", borderBottom: `2px solid ${GOLD}44` }}>Ticker</th>
            {hdr("PL (R$bi)", "pl")}
            {hdr("P/VP", "pvp")}
            {hdr("DY 12m", "dy12m")}
            {hdr("Taxa", "taxa")}
            {hdr("IPCA %", "ipca")}
            {hdr("CRIs", "cris")}
            {hdr("Adimpl.", "adimpl")}
            <th style={{ padding: "10px 8px", textAlign: "center", color: GOLD, fontSize: 11, borderBottom: `2px solid ${GOLD}44` }}>Tipo</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((f, i) => {
            const isFusao = ["VCJR11", "RBRR11", "PCIP11"].includes(f.ticker);
            return (
              <tr key={f.ticker} style={{
                background: isFusao ? `${GOLD}11` : i % 2 ? BG_CARD2 : "transparent",
                borderLeft: isFusao ? `3px solid ${GOLD}` : "3px solid transparent",
              }}>
                <td style={{ padding: "8px", fontWeight: 700, color: isFusao ? GOLD : WHITE }}>{f.ticker}</td>
                <td style={{ padding: "8px", textAlign: "right", color: WHITE }}>{f.pl.toFixed(2)}</td>
                <td style={{ padding: "8px", textAlign: "right", color: f.pvp < 0.90 ? GREEN : f.pvp > 1 ? RED : WHITE }}>{f.pvp.toFixed(2)}</td>
                <td style={{ padding: "8px", textAlign: "right", color: f.dy12m > 14 ? GREEN : WHITE, fontWeight: f.dy12m > 14 ? 700 : 400 }}>{f.dy12m.toFixed(1)}%</td>
                <td style={{ padding: "8px", textAlign: "right", color: f.taxa > 1.2 ? RED : WHITE }}>{f.taxa.toFixed(2)}%</td>
                <td style={{ padding: "8px", textAlign: "right", color: WHITE }}>{f.ipca}%</td>
                <td style={{ padding: "8px", textAlign: "right", color: WHITE }}>{f.cris}</td>
                <td style={{ padding: "8px", textAlign: "right", color: f.adimpl === 100 ? GREEN : f.adimpl < 95 ? RED : WHITE }}>{f.adimpl}%</td>
                <td style={{ padding: "8px", textAlign: "center" }}><Badge text={f.tipo} color={f.tipo === "IPCA" ? GOLD : f.tipo === "CDI" ? BLUE : MUTED} /></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function Calculator() {
  const [aporte, setAporte] = useState(10000);
  const [dy, setDy] = useState(13);
  const [anos, setAnos] = useState(10);
  const [reinvest, setReinvest] = useState(true);

  const data = [];
  let patrimonio = aporte;
  for (let i = 0; i <= anos; i++) {
    const divAnual = patrimonio * (dy / 100);
    data.push({ ano: i, patrimonio: Math.round(patrimonio), dividendos: Math.round(divAnual), mensal: Math.round(divAnual / 12) });
    if (reinvest) patrimonio += divAnual;
  }
  const final = data[data.length - 1];

  return (
    <Card>
      <h3 style={{ color: GOLD, fontSize: 16, fontWeight: 800, marginBottom: 16, fontFamily: "'Playfair Display', serif" }}>⚡ Calculadora de Renda Passiva</h3>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 16, marginBottom: 20 }}>
        <div>
          <label style={{ fontSize: 11, color: MUTED, display: "block", marginBottom: 4 }}>APORTE INICIAL (R$)</label>
          <input type="number" value={aporte} onChange={e => setAporte(+e.target.value)} style={{
            width: "100%", padding: "8px 12px", background: BG_DARK, border: `1px solid #444`,
            borderRadius: 8, color: WHITE, fontSize: 16, fontWeight: 700, boxSizing: "border-box",
          }} />
        </div>
        <div>
          <label style={{ fontSize: 11, color: MUTED, display: "block", marginBottom: 4 }}>DY ANUAL (%)</label>
          <input type="range" min={5} max={20} step={0.5} value={dy} onChange={e => setDy(+e.target.value)} style={{ width: "100%", accentColor: GOLD }} />
          <span style={{ color: GOLD, fontWeight: 700, fontSize: 18 }}>{dy}%</span>
        </div>
        <div>
          <label style={{ fontSize: 11, color: MUTED, display: "block", marginBottom: 4 }}>HORIZONTE (ANOS)</label>
          <input type="range" min={1} max={30} value={anos} onChange={e => setAnos(+e.target.value)} style={{ width: "100%", accentColor: GOLD }} />
          <span style={{ color: GOLD, fontWeight: 700, fontSize: 18 }}>{anos}</span>
        </div>
        <div>
          <label style={{ fontSize: 11, color: MUTED, display: "block", marginBottom: 4 }}>REINVESTIR?</label>
          <button onClick={() => setReinvest(!reinvest)} style={{
            padding: "8px 20px", background: reinvest ? GOLD : "transparent",
            color: reinvest ? BG_DARK : MUTED, border: `1px solid ${GOLD}`,
            borderRadius: 8, fontWeight: 700, cursor: "pointer", fontSize: 14,
          }}>{reinvest ? "SIM ✓" : "NÃO"}</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
        <MetricBox label="Patrimônio Final" value={`R$ ${(final.patrimonio/1000).toFixed(1)}k`} color={GREEN} />
        <MetricBox label="Renda Mensal Final" value={`R$ ${final.mensal}`} color={GOLD} />
        <MetricBox label="Total Dividendos" value={`R$ ${(data.reduce((s,d)=>s+d.dividendos,0)/1000).toFixed(1)}k`} color={GOLD_LIGHT} />
      </div>

      <ResponsiveContainer width="100%" height={220}>
        <AreaChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke="#333" />
          <XAxis dataKey="ano" stroke={MUTED} tick={{ fontSize: 11 }} label={{ value: "Anos", position: "insideBottom", offset: -4, fill: MUTED, fontSize: 11 }} />
          <YAxis stroke={MUTED} tick={{ fontSize: 11 }} tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
          <Tooltip contentStyle={{ background: BG_CARD, border: `1px solid ${GOLD}44`, borderRadius: 8, color: WHITE, fontSize: 12 }}
            formatter={(v) => [`R$ ${v.toLocaleString("pt-BR")}`, ""]} />
          <Area type="monotone" dataKey="patrimonio" stroke={GOLD} fill={`${GOLD}33`} strokeWidth={2} name="Patrimônio" />
          <Area type="monotone" dataKey="dividendos" stroke={GREEN} fill={`${GREEN}22`} strokeWidth={2} name="Div./Ano" />
        </AreaChart>
      </ResponsiveContainer>
    </Card>
  );
}

              </ResponsiveContainer>
              <p style={{ fontSize: 12, color: WHITE, marginTop: 8 }}>
                <strong style={{ color: GOLD }}>Delta VCJR11:</strong> de 1,60% → 1,05% (cenário base) = economia de 0,55% a.a. sobre R$ 1,4 bi ≈ <strong style={{ color: GREEN }}>R$ 7,7M/ano</strong> a mais para distribuição (~R$ 0,52/cota/ano).
              </p>
            </Card>

            <Card style={{ marginBottom: 16 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <div style={{ padding: 16, background: `${GREEN}10`, borderRadius: 8, border: `1px solid ${GREEN}33` }}>
                  <h4 style={{ color: GREEN, margin: "0 0 8px", fontSize: 14 }}>🐂 BULL CASE</h4>
                  <ul style={{ margin: 0, paddingLeft: 16, color: WHITE, fontSize: 12, lineHeight: 1.8 }}>
                    <li>Tendência global: REITs grandes + líquidos</li>
                    <li>KNIP11 prova que FII &gt;R$7bi atrai fluxo institucional e opera com P/VP ~1,0</li>
                    <li>Poder de barganha na originação de CRI</li>
                    <li>Custo administrativo unitário cai (3 auditorias→1)</li>
                    <li>Peso IFIX ~2,75% atrai alocação passiva</li>
                    <li>Economia de taxa gera ~R$0,52/cota/ano extra (VCJR)</li>

                    <li>Reciclar 39% CDI/IGP-M do RBRR gera custo de transição</li>
                    <li>PCIP tem 6,4% ativos problemáticos absorvidos</li>
                  </ul>
                </div>

                <li><strong style={{ color: GOLD }}>Taxa combinada:</strong> será &lt;1,10% sem performance? Se não, qual o delta real?</li>
                <li><strong style={{ color: GOLD }}>Reciclagem de indexadores:</strong> prazo e custo de converter 39% CDI/IGP-M do RBRR para IPCA?</li>
                <li><strong style={{ color: GOLD }}>Tratamento tributário:</strong> incorporação patrimonial (sem IR) ou liquidação+recompra?</li>
                <li><strong style={{ color: GOLD }}>Conflitos:</strong> CRI intra-grupo (PCIP11 → outro fundo VBI) será mantido ou vendido?</li>
                <li><strong style={{ color: GOLD }}>Administrador fiduciário:</strong> qual será mantido? BTG vs. BRL Trust vs. Intrag?</li>

              <FIITable data={fiiBR} sort={sort} setSort={setSort} />

            <SectionTitle icon="📊">DY vs. P/VP — Mapa de Oportunidades</SectionTitle>
            <Card>
              <ResponsiveContainer width="100%" height={320}>
                <BarChart data={fiiBR.sort((a,b) => b.dy12m - a.dy12m)} layout="vertical">

                  <XAxis type="number" stroke={MUTED} tick={{ fontSize: 11 }} domain={[0, 18]} tickFormatter={v => `${v}%`} />
                  <YAxis type="category" dataKey="ticker" stroke={MUTED} tick={{ fontSize: 11 }} width={70} />

              <div style={{ overflowX: "auto" }}>

                      {["Ticker", "Nome", "Tipo", "DY (%)", "Market Cap ($bi)", "P/VP", "Setor"].map(h => (
                        <th key={h} style={{ padding: "10px 8px", textAlign: h === "Ticker" || h === "Nome" || h === "Setor" ? "left" : "right", color: GOLD, fontSize: 11, borderBottom: `2px solid ${GOLD}44`, textTransform: "uppercase" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {reitUS.sort((a,b) => b.dy - a.dy).map((r, i) => {
                      const isMort = r.tipo === "Mortgage";
                      return (
                        <tr key={r.ticker} style={{ background: isMort ? `${GOLD}11` : i % 2 ? BG_CARD2 : "transparent", borderLeft: isMort ? `3px solid ${GOLD}` : "3px solid transparent" }}>

            <Card>
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={[
                  { nome: "VCJR11", dy: 14.1, tipo: "FII" },
                  { nome: "PCIP11", dy: 14.7, tipo: "FII" },

                  <CartesianGrid strokeDasharray="3 3" stroke="#333" />

            </Card>
          </div>

        {/* ===== CALCULATOR ===== */}
        {tab === "calc" && (
          <div>
            <SectionTitle icon="⚡">Calculadora Financeira</SectionTitle>
            <Calculator />
            <div style={{ marginTop: 16 }}>
              <Card>
                <h3 style={{ color: GOLD, fontSize: 14, fontWeight: 800, marginBottom: 8 }}>Simulação Rápida: Quanto rende o fundo combinado?</h3>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12 }}>

        {/* ===== SOURCES ===== */}
        {tab === "fontes" && (

                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: GOLD, flexShrink: 0 }} />

                      <div style={{ fontSize: 13, fontWeight: 700, color: WHITE }}>{f.nome}</div>

            <div style={{ marginTop: 16, padding: 16, background: `${RED}11`, borderRadius: 8, border: `1px solid ${RED}33` }}>
              <p style={{ fontSize: 12, color: RED, fontWeight: 700, margin: 0 }}>
                DISCLAIMER: Análise especulativa baseada em informações públicas. A fusão VCJR11+RBRR11+PCIP11 NÃO foi formalmente anunciada. Não constitui recomendação de investimento. Dados de março-abril 2026.
              </p>

        {/* FOOTER */}
        <div style={{ marginTop: 40, textAlign: "center", padding: "24px 0", borderTop: `1px solid #333` }}>
          <p style={{ fontSize: 11, color: MUTED }}>Relatório gerado em Abril 2026 • Dados públicos compilados de B3, StatusInvest, FundsExplorer, BrFiis, relatórios gerenciais</p>

        </div>

    </div>

}
